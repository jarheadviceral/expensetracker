{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Pocket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <link rel="stylesheet" href="{% static 'expenses/css/style.css' %}">
</head>
<body>
    <nav class="topbar mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="app-title mb-0">Pixel Pocket</h1>
            <div class="username-pill">{{ request.session.username|default:'Guest' }}</div>
        </div>
    </nav>

    <main class="container pb-5">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info retro-alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{% static 'expenses/js/dashboard.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
