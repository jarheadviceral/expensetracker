{% extends 'expenses/base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-7 col-md-9">

<section class="retro-card">

<h2 class="retro-heading mb-3">
Edit Expense
</h2>

<p class="mb-4">
Updating: <strong>{{ expense.item_name }}</strong>
</p>

<form method="post">

{% csrf_token %}

<div class="row g-3">

<div class="col-md-6">

<label class="form-label">
Item
</label>

{{ form.item_name }}

</div>

<div class="col-md-6">

<label class="form-label">
Amount
</label>

{{ form.amount }}

</div>

<div class="col-md-6">

<label class="form-label">
Date
</label>

{{ form.date_created }}

</div>

<div class="col-md-6">

<label class="form-label">
Category
</label>

{{ form.category }}

</div>

<div class="col-12">

<label class="form-label">
Notes
</label>

{{ form.notes }}

</div>

</div>


<div class="d-flex gap-2 mt-4">

<button type="submit" class="retro-btn">
Update Expense
</button>

<a href="{% url 'dashboard' %}" class="retro-btn-alt">
Cancel
</a>

</div>

</form>

</section>

</div>

</div>

{% endblock %}
