{% extends 'expenses/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <section class="retro-card p-4">
            <h2 class="retro-heading">Edit expense: {{ expense.item_name }}</h2>
            <form method="post" class="mt-3">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Item</label>
                        {{ form.item_name }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Amount</label>
                        {{ form.amount }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Date</label>
                        {{ form.date_created }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Category</label>
                        {{ form.category }}
                    </div>
                    <div class="col-12">
                        <label class="form-label">Notes</label>
                        {{ form.notes }}
                    </div>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn retro-btn">Update</button>
                    <a href="{% url 'dashboard' %}" class="btn retro-btn-alt">Cancel</a>
                </div>
            </form>
        </section>
    </div>
</div>
{% endblock %}
