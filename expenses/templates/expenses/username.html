{% extends 'expenses/base.html' %}
{% load static %}

{% block page_content_class %}auth-page{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <section class="retro-card auth-card">

        <h2 class="retro-heading mb-3 text-center">
            Create your profile
        </h2>

        <p class="text-center mb-4">
            Set your username to start tracking your expenses!
        </p>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                {{ form.username }}
            </div>

            <button class="btn retro-btn w-100" type="submit">
                Enter Dashboard
            </button>

        </form>

    </section>

</div>

{% endblock %}
